version: '3.8'
services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "192.168.0.49:51820:51820/udp"          # WireGuard 端口（建议只绑定 Wi-Fi IP）
      - "192.168.0.49:51821:51821/tcp"          # Web UI 端口
    environment:
      - LANG=en
      - WG_HOST=192.168.0.49          # ← 改成你的 Mac Wi-Fi IP 地址
      - WG_PORT=51820
      - WG_DEFAULT_DNS=1.1.1.1,8.8.8.8
      - WG_ALLOWED_IPS=0.0.0.0/1,128.0.0.0/1,192.168.0.0/16 # 只代理公网，不走本地
      - WG_PERSISTENT_KEEPALIVE=25
      - PASSWORD_HASH=$$2a$$12$$PRYBwD2POCU1Is4hXK8zY.H6/ucCCX7j8xNPvir9BslFRaQFmIgSK
      - WG_PRE_UP=iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE 
    volumes:
      - ./wireguard:/etc/wireguard
    # 如果想更精确绑定 Wi-Fi IP，可加：
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: 10m